<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact — Simply Savory</title>
  <link rel="stylesheet" href="styles.css?v=6">
</head>
<body>

  <!-- Navigation -->
  <nav class="navbar">
    <div class="nav-inner">
      <a href="index.html" class="nav-logo">
        <span class="logo-icon">🍽</span>
        Simply Savory
      </a>
      <div class="nav-links" id="navLinks">
        <a href="index.html">Home</a>
        <a href="recipes.html">Recipes</a>
        <a href="categories.html">Categories</a>
        <a href="about.html">About</a>
        <a href="contact.html" class="active">Contact</a>
      </div>
      <button class="nav-toggle" id="navToggle" aria-label="Toggle navigation">
        <span></span>
        <span></span>
        <span></span>
      </button>
    </div>
    <div class="nav-overlay" id="navOverlay"></div>
  </nav>

  <!-- Page Hero -->
  <section class="page-hero">
    <div class="container">
      <h1>Contact Us</h1>
      <p>Have a question, suggestion, or recipe idea? We'd love to hear from you!</p>
    </div>
  </section>

  <!-- Contact Form -->
  <section class="section">
    <div class="container">
      <div class="contact-form-wrapper">
        <div class="contact-form">
          <div class="form-group">
            <label for="name">Your Name</label>
            <input type="text" id="name" placeholder="Enter your name">
          </div>
          <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" placeholder="Enter your email">
          </div>
          <div class="form-group">
            <label for="subject">Subject</label>
            <input type="text" id="subject" placeholder="What's this about?">
          </div>
          <div class="form-group">
            <label for="message">Message</label>
            <textarea id="message" placeholder="Write your message here..."></textarea>
          </div>
          <button class="btn btn-primary" style="align-self: flex-start;">Send Message &rarr;</button>
        </div>
      </div>
    </div>
  </section>

  <!-- Footer -->
  <footer class="footer">
    <div class="footer-inner">
      <span class="footer-copy">&copy; 2026 Simply Savory</span>
      <div class="footer-links">
        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>
      </div>
    </div>
  </footer>

<script src="nav.js" defer></script>
</body>
</html>
