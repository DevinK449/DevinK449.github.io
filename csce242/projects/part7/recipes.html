<!DOCTYPE html>
<html lang="en">
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recipes — Simply Savory</title>
  <link rel="stylesheet" href="styles.css?v=8">
</head>

<body>

  <nav class="navbar">
    <div class="nav-inner">
      <a href="index.html" class="nav-logo">
        <span class="logo-icon">🍽</span>
        Simply Savory
      </a>

      <div class="nav-links" id="navLinks">
        <a href="index.html">Home</a>
        <a href="recipes.html" class="active">Recipes</a>
        <a href="categories.html">Categories</a>
        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>
      </div>

      <button class="nav-toggle" id="navToggle" aria-label="Toggle navigation" aria-expanded="false">
        <span></span>
        <span></span>
        <span></span>
      </button>
    </div>
    <div class="nav-overlay" id="navOverlay"></div>
  </nav>

  <section class="page-hero">
    <div class="container">
      <div class="breadcrumb" style="text-align:left;">
        <a href="index.html">Home</a>
        <span>›</span>
        Recipes
      </div>
      <h1>Recipes</h1>
      <p>Discover a variety of delicious and easy-to-follow recipes for every occasion.</p>
    </div>
  </section>

  <section class="section" style="padding-top: 0;">
    <div class="container">
      <div class="filter-bar" id="filterBar">
        <button class="filter-btn active" data-category="All">All</button>
        <button class="filter-btn" data-category="Breakfast">Breakfast</button>
        <button class="filter-btn" data-category="Lunch">Lunch</button>
        <button class="filter-btn" data-category="Dinner">Dinner</button>
        <button class="filter-btn" data-category="Pasta">Pasta</button>
        <button class="filter-btn" data-category="Chicken">Chicken</button>
        <button class="filter-btn" data-category="Vegetarian">Vegetarian</button>
        <button class="filter-btn" data-category="Soups">Soups</button>
        <button class="filter-btn" data-category="Quick & Easy">Quick &amp; Easy</button>
        <button class="filter-btn" data-category="Desserts">Desserts</button>
      </div>

      <div class="recipes-grid" id="recipes-container" style="margin-top: 36px;"></div>

      <div class="load-more-wrapper">
        <a href="contact.html" class="btn btn-outline">Request a Recipe</a>
      </div>
    </div>
  </section>

  <footer class="footer">
    <div class="footer-inner">
      <span class="footer-copy">&copy; 2026 Simply Savory</span>
      <div class="footer-links">
        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>
      </div>
    </div>
  </footer>

  <script src="nav.js" defer></script>

  <script>
    let allRecipes = [];

    function getRecipeLink(recipe) {
      return recipe.page || "recipes.html";
    }

    function renderRecipes(recipes) {
      const container = document.getElementById("recipes-container");
      container.innerHTML = "";

      if (recipes.length === 0) {
        container.innerHTML = `<p style="grid-column: 1 / -1; text-align:center;">No recipes found in this category.</p>`;
        return;
      }

      recipes.forEach(recipe => {
        const recipeCard = document.createElement("a");
        recipeCard.href = getRecipeLink(recipe);
        recipeCard.className = "recipe-card";

        recipeCard.innerHTML = `
          <div class="recipe-card-img">
            <img src="${recipe.img_name}" alt="${recipe.name}">
            <span class="recipe-card-time">${recipe.time}</span>
          </div>
          <div class="recipe-card-body">
            <h3>${recipe.name}</h3>
            <p>${recipe.description}</p>
            <div class="recipe-card-meta">
              <span class="stars">&#9733;&#9733;&#9733;&#9733;&#9733;</span>
              <span class="rating">${recipe.rating}</span>
              <span>(${recipe.reviews} reviews)</span>
              <span>&nbsp;·&nbsp;${recipe.category}</span>
            </div>
          </div>
        `;

        container.appendChild(recipeCard);
      });
    }

    async function loadRecipes() {
      try {
        const response = await fetch("https://devink449.github.io/csce242/projects/part7/recipies.json");
        if (!response.ok) throw new Error("Could not load recipe data.");

        allRecipes = await response.json();
        renderRecipes(allRecipes);
      } catch (error) {
        document.getElementById("recipes-container").innerHTML = `
          <p style="grid-column: 1 / -1; text-align:center;">
            Sorry, recipes could not be loaded right now.
          </p>
        `;
      }
    }

    document.addEventListener("DOMContentLoaded", () => {
      loadRecipes();

      const filterButtons = document.querySelectorAll(".filter-btn");
      filterButtons.forEach(btn => {
        btn.addEventListener("click", () => {
          filterButtons.forEach(button => button.classList.remove("active"));
          btn.classList.add("active");

          const selectedCategory = btn.dataset.category;

          if (selectedCategory === "All") {
            renderRecipes(allRecipes);
          } else {
            const filtered = allRecipes.filter(
              recipe => recipe.category === selectedCategory
            );
            renderRecipes(filtered);
          }
        });
      });
    });
  </script>
</body>
</html>
